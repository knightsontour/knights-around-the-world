baseURL = "https://knights-around-the-world.pages.dev/"
title = "Knights on Tour"
theme = "beautifulhugo"
DefaultContentLanguage = "en"

[pagination]
  pagerSize = 50

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[Params]
  homeTitle = "Knights on Tour"
  subtitle = "Travel blogs by Steve & Nicole Knight"
  dateFormat = "2 January 2006"
  colorScheme = "auto"
  rss = true
  readingTime = true
  wordCount = true
  socialShare = false
  showRelatedPosts = true
  disableFigureOverride = true
  headerImgStyle = "narrow"
  [Params.search]
    provider = "fuse"
  [Params.author]
    name = "Steve & Nicole Knight"
    github = "knightsontour"

[markup.goldmark.renderer]
  unsafe = true
[markup.highlight]
  noClasses = false

[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1
# "Trips" is a dropdown parent (no url). Add one child per trip below.
[[menu.main]]
  identifier = "trips"
  name = "Trips"
  weight = 2
[[menu.main]]
  parent = "trips"
  name = "Knights Around the World 2017-18"
  url = "/travel/knights-around-the-world-2017-18/"
  weight = 1
[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 3
[[menu.main]]
  name = "Search"
  url = "/search/"
  weight = 4
