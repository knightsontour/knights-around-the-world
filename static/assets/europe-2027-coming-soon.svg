<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="A Midsummer Knight's Dream — Coming in 2027">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2a5b"/>
      <stop offset="0.55" stop-color="#26336e"/>
      <stop offset="1" stop-color="#0e1430"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fdf6d8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fdf6d8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#f3f0ff">
    <circle cx="120" cy="90" r="2.2" opacity="0.9"/>
    <circle cx="240" cy="150" r="1.5" opacity="0.7"/>
    <circle cx="330" cy="70" r="2.6" opacity="0.95"/>
    <circle cx="520" cy="120" r="1.6" opacity="0.6"/>
    <circle cx="700" cy="80" r="2" opacity="0.85"/>
    <circle cx="860" cy="150" r="1.4" opacity="0.65"/>
    <circle cx="1080" cy="110" r="2.4" opacity="0.9"/>
    <circle cx="180" cy="260" r="1.4" opacity="0.6"/>
    <circle cx="1010" cy="250" r="1.7" opacity="0.7"/>
    <circle cx="620" cy="210" r="1.3" opacity="0.55"/>
    <circle cx="430" cy="240" r="1.6" opacity="0.6"/>
  </g>

  <!-- moon -->
  <circle cx="980" cy="170" r="150" fill="url(#moonGlow)"/>
  <circle cx="980" cy="170" r="70" fill="#fdf6d8"/>
  <circle cx="1015" cy="150" r="62" fill="#26336e"/>

  <!-- knight chess piece -->
  <text x="600" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="150" fill="#e9c46a" text-anchor="middle" opacity="0.95">&#9822;</text>

  <!-- title + status -->
  <text x="600" y="420" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-style="italic" fill="#f3f0ff" text-anchor="middle">A Midsummer Knight&#8217;s Dream</text>
  <text x="600" y="500" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#cdd6ff" text-anchor="middle" letter-spacing="2">Europe</text>

  <text x="600" y="612" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#e9c46a" text-anchor="middle" letter-spacing="3">COMING IN 2027</text>
</svg>
